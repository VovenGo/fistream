name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true

      - name: Download deps
        run: go mod download

      - name: Format check
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Unit and integration tests
        run: go test ./...

      - name: Build API
        run: go build ./cmd/api

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build image
        run: docker build -t fistream-api:ci .


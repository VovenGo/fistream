apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: fistream
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: REPLACE_IMAGE
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fistream-secrets
                  key: database-url
            - name: SERVICE_ACCESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fistream-secrets
                  key: service-access-password
            - name: API_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: fistream-secrets
                  key: api-token-secret
            - name: JITSI_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: fistream-secrets
                  key: jitsi-domain
            - name: JITSI_APP_ID
              valueFrom:
                secretKeyRef:
                  name: fistream-secrets
                  key: jitsi-app-id
            - name: JITSI_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: fistream-secrets
                  key: jitsi-app-secret
            - name: JITSI_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: fistream-secrets
                  key: jitsi-audience
            - name: JITSI_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: fistream-secrets
                  key: jitsi-subject
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: fistream-secrets
                  key: allowed-origins
            - name: ROOM_TTL
              value: 2h
            - name: APP_BUILD_ID
              value: "prod"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: fistream
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080

